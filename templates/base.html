<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}OBJET-X - Detector de Objetos{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">

    <link rel="shortcut icon" href="{{ url_for('static', filename='image/fabicon.svg') }}" type="image/x-icon">
    
    {% block custom_css %}{% endblock %}
</head>
<body>

    {% include 'components/header.html' %}

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <script src="{{ url_for('static', filename='js/global.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/header.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/footer.js') }}" defer></script>
    
    {% block custom_js %}{% endblock %}
</body>
</html>
